<html lang="ru"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sign-in instagram</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121212;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #121212;
    }

    .logo-header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 26px 0 22px;
    }

    .logo-header svg { width: 64px; height: 64px; }

    .content {
      flex: 1;
      padding: 44px 24px 36px;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 1.45rem;
      font-weight: 200;
      color: #f5f5f5;
      margin-bottom: 24px;
    }

    .field {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      padding: 16px 16px;
      font-size: 0.95rem;
      color: #f5f5f5;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 10px;
      -webkit-appearance: none;
      font-family: inherit;
    }

    .field::placeholder { color: #666; }
    .field:focus { border-color: #555; }

    .btn-login {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #1a3a7a;
      color: #8aabdf;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      font-family: inherit;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #1f4494; }
    .btn-login:active { transform: scale(0.98); }

    .forgot {
      text-align: center;
      color: #e0e0e0;
      font-size: 0.93rem;
      font-weight: 500;
      margin-top: 20px;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .forgot:hover { opacity: 0.7; }

    .gap { flex: 1; min-height: 40px; }

    .btn-fb {
      width: 100%;
      padding: 14px;
      border: 1.5px solid #3a3a3a;
      border-radius: 12px;
      background: transparent;
      color: #f5f5f5;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      font-family: inherit;
      transition: background 0.2s;
    }

    .btn-fb:hover { background: rgba(255,255,255,0.05); }

    .fb-icon { width: 20px; height: 20px; flex-shrink: 0; }

    .btn-create {
      width: 100%;
      padding: 14px;
      border: 1.5px solid #3a6fd4;
      border-radius: 12px;
      background: transparent;
      color: #4a90e2;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .btn-create:hover { background: rgba(74,144,226,0.08); }
  </style>
</head>
